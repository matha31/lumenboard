const REF = DATA.reference_date;
const REF_MS = Date.parse(REF);
const DAY = 86400000;
const POSITIVE = new Set(['seat_added', 'invite_sent', 'integration_connected']);
const BUCKETS = [
  { key: 'urgent', label: 'Urgent' },
  { key: 'watch', label: 'Watch' },
  { key: 'healthy', label: 'Healthy' },
];

const clamp = (n, lo, hi) => Math.min(hi, Math.max(lo, n));
const avg = (ws) => ws.length ? ws.reduce((s, w) => s + w.active_users, 0) / ws.length : 0;

// The spec.md risk formula, computed client-side against the fixed reference date.
function computeRisk(acc, series) {
  const risk_health = clamp((100 - acc.health_score) / 100, 0, 1);
  let risk_usage = 0, pct = null;
  const insufficient = series.length < 6;
  if (!insufficient) {
    const f = avg(series.slice(0, 3)), l = avg(series.slice(-3));
    if (f !== 0) { pct = (l - f) / f; risk_usage = clamp(-pct / 0.5, 0, 1); }
  }
  const days = Math.floor((Date.parse(acc.renewal_date) - REF_MS) / DAY);
  const risk_renewal = clamp((90 - days) / 60, 0, 1);
  const combined = 0.4 * risk_health + 0.4 * risk_usage + 0.2 * risk_renewal;
  const bucket = (combined >= 0.6 && risk_renewal >= 0.5) ? 'urgent' : (combined >= 0.4 ? 'watch' : 'healthy');
  return { bucket, combined, risk_renewal, days, insufficient, pct };
}

function reasonText(acc, r) {
  const parts = ['health ' + acc.health_score];
  if (r.insufficient) parts.push('usage trend unavailable (fewer than 6 weeks)');
  else if (r.pct !== null) {
    const p = Math.round(Math.abs(r.pct) * 100);
    parts.push(r.pct < 0 ? 'active users down ' + p + '% over the tracked weeks' : 'active users up ' + p + '% over the tracked weeks');
  }
  parts.push(r.days < 0 ? 'renewed ' + Math.abs(r.days) + ' days ago' : 'renews in ' + r.days + ' days');
  return parts.join(', ');
}

function money(n) { return '$' + n.toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 2 }); }
function esc(s) { return String(s).replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])); }

function sparkline(series) {
  const vals = series.map((w) => w.active_users);
  if (!vals.length) return '<span class="spark-cap">no usage history</span>';
  const w = 132, h = 34, pad = 3;
  const max = Math.max(...vals), min = Math.min(...vals), span = (max - min) || 1;
  const x = (i) => pad + (i * (w - 2 * pad)) / (vals.length - 1 || 1);
  const y = (v) => pad + (h - 2 * pad) * (1 - (v - min) / span);
  const pts = vals.map((v, i) => x(i).toFixed(1) + ',' + y(v).toFixed(1));
  const area = 'M' + pts.join(' L') + ' L' + x(vals.length - 1).toFixed(1) + ',' + (h - pad) + ' L' + x(0).toFixed(1) + ',' + (h - pad) + ' Z';
  const ex = x(vals.length - 1).toFixed(1), ey = y(vals[vals.length - 1]).toFixed(1);
  return '<svg width="' + w + '" height="' + h + '" viewBox="0 0 ' + w + ' ' + h + '" aria-hidden="true">' +
    '<path d="' + area + '" fill="var(--accent)" opacity="0.12" />' +
    '<polyline points="' + pts.join(' ') + '" fill="none" stroke="var(--spark)" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round" />' +
    '<circle cx="' + ex + '" cy="' + ey + '" r="2.6" fill="var(--accent)" />' +
    '</svg>';
}

function eventChips(id) {
  const counts = DATA.eventCounts[id] || {};
  const types = Object.keys(counts).sort((a, b) => counts[b] - counts[a]);
  if (!types.length) return '<span class="spark-cap">no recent events</span>';
  return '<div class="chips">' + types.map((t) =>
    '<span class="chip ' + (POSITIVE.has(t) ? 'pos' : '') + '">' + esc(t) + ' <span class="n">' + counts[t] + '</span></span>'
  ).join('') + '</div>';
}

// Pre-score every account once.
const SCORED = DATA.accounts.map((acc) => {
  const series = DATA.usage[acc.id] || [];
  const r = computeRisk(acc, series);
  return { ...acc, ...r, series, reason: reasonText(acc, r) };
});

const els = {
  board: document.getElementById('board'), kpis: document.getElementById('kpis'),
  search: document.getElementById('f-search'), plan: document.getElementById('f-plan'),
  window: document.getElementById('f-window'), sort: document.getElementById('f-sort'),
  note: document.getElementById('count-note'), asof: document.getElementById('asof-date'),
};
els.asof.textContent = REF;

function renderKpis() {
  const by = { urgent: [], watch: [], healthy: [] };
  SCORED.forEach((a) => by[a.bucket].push(a));
  const atRisk = [...by.urgent, ...by.watch].reduce((s, a) => s + a.mrr, 0);
  const tiles = [
    { lab: 'Urgent', cls: 'urgent', num: by.urgent.length, foot: 'call this week' },
    { lab: 'Watch', cls: 'watch', num: by.watch.length, foot: 'monitor' },
    { lab: 'Healthy', cls: 'healthy', num: by.healthy.length, foot: 'no action' },
    { lab: 'MRR at risk', cls: 'accent', num: '$' + Math.round(atRisk).toLocaleString('en-US'), foot: 'urgent + watch' },
  ];
  els.kpis.innerHTML = tiles.map((t) =>
    '<div class="kpi"><div class="lab"><span class="dot ' + t.cls + '"></span>' + t.lab + '</div>' +
    '<div class="num">' + t.num + '</div><div class="foot">' + t.foot + '</div></div>'
  ).join('');
}

function passes(a) {
  const q = els.search.value.trim().toLowerCase();
  if (q && !a.name.toLowerCase().includes(q)) return false;
  if (els.plan.value && a.plan !== els.plan.value) return false;
  if (els.window.value) { const d = Number(els.window.value); if (!(a.days >= 0 && a.days <= d)) return false; }
  return true;
}
function sortList(list) {
  const s = els.sort.value;
  return list.slice().sort((a, b) =>
    s === 'mrr' ? b.mrr - a.mrr : s === 'renewal' ? a.days - b.days : s === 'name' ? a.name.localeCompare(b.name) : b.combined - a.combined);
}

function cardHtml(a) {
  const renewal = a.days < 0 ? 'renewed ' + Math.abs(a.days) + 'd ago' : 'renews in ' + a.days + 'd';
  const flag = a.insufficient ? '<span class="flag">insufficient usage history</span>' : '';
  return '<article class="card" data-id="' + a.id + '">' +
    '<button class="card-top" aria-expanded="false">' +
      '<span class="name">' + esc(a.name) + '<span class="plan">' + esc(a.plan) + '</span></span>' +
      '<span class="meta">' + money(a.mrr) + ' &middot; ' + renewal + '</span>' +
      '<span class="reason">' + esc(a.reason) + flag + ' <span class="chev">&rsaquo;</span></span>' +
    '</button>' +
    '<div class="detail"><div class="detail-inner"><div class="detail-pad">' +
      '<div class="spark-wrap"><span class="spark-cap">weekly active users</span>' + sparkline(a.series) + '</div>' +
      eventChips(a.id) +
    '</div></div></div></article>';
}

function render() {
  const shown = SCORED.filter(passes);
  els.note.textContent = shown.length + ' of ' + SCORED.length + ' accounts';
  els.board.innerHTML = BUCKETS.map(({ key, label }) => {
    const list = sortList(shown.filter((a) => a.bucket === key));
    const body = list.length ? '<div class="cards">' + list.map(cardHtml).join('') + '</div>'
      : '<div class="empty">No accounts in this bucket for the current filters.</div>';
    return '<section class="bucket b-' + key + '"><div class="bucket-head"><h2>' + label + '</h2>' +
      '<span class="pill">' + list.length + '</span><span class="rail"></span></div>' + body + '</section>';
  }).join('');
  els.board.querySelectorAll('.card-top').forEach((btn) => {
    btn.addEventListener('click', () => {
      const card = btn.closest('.card');
      const open = card.classList.toggle('open');
      btn.setAttribute('aria-expanded', open ? 'true' : 'false');
    });
  });
}

[els.search, els.plan, els.window, els.sort].forEach((el) => el.addEventListener('input', render));
renderKpis();
render();
</script>
